<!DOCTYPE html>
<html>
<head>
  <title>Sign Up — ReZniX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d14;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.1;
      z-index: 0;
      pointer-events: none;
    }

    .blob1 { width: 500px; height: 500px; background: #7c3aed; top: -150px; right: -150px; }
    .blob2 { width: 400px; height: 400px; background: #06b6d4; bottom: -100px; left: -100px; }

    .card {
      background: rgba(20, 16, 35, 0.95);
      border: 1px solid #2e2a45;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 32px;
      display: block;
      text-align: center;
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      text-align: center;
    }

    .sub {
      font-size: 14px;
      color: #6b7280;
      text-align: center;
      margin-bottom: 32px;
    }

    .error-box {
      background: #2d0a0a;
      border: 1px solid #7f1d1d;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
    }

    input {
      width: 100%;
      background: #0d0d14;
      border: 1px solid #2e2a45;
      border-radius: 12px;
      color: #e2e8f0;
      padding: 13px 16px;
      font-size: 14px;
      margin-bottom: 20px;
      outline: none;
      transition: border 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }

    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124,58,237,0.4); }

    .divider {
      text-align: center;
      font-size: 13px;
      color: #4b5563;
      margin-bottom: 20px;
    }

    .login-link {
      display: block;
      text-align: center;
      font-size: 14px;
      color: #a78bfa;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }

    .login-link:hover { color: #7c3aed; }

    .password-hint {
      font-size: 11px;
      color: #4b5563;
      margin-top: -14px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="card">
    <span class="logo">✦ ReZniX</span>
    <h2>Create account</h2>
    <p class="sub">Start analyzing your resume for free</p>

    {% if error %}
    <div class="error-box">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="Tarandeep Singh" required>

      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@example.com" required>

      <label>Password</label>
      <input type="password" name="password" placeholder="Min 6 characters" required>
      <p class="password-hint">Must be at least 6 characters</p>

      <label>Confirm Password</label>
      <input type="password" name="confirm_password" placeholder="Repeat your password" required>

      <button type="submit" class="submit-btn">Create Account →</button>
    </form>

    <div class="divider">Already have an account?</div>
    <a href="/login" class="login-link">Login instead →</a>
  </div>
</body>
</html>
